{{ define "404.html" }}
<!DOCTYPE html>
<html lang="zh-CN">
{{ template "head" . }}
<body>
  {{ template "header" . }}

  <main>
    <div class="container">
      <div class="not-found">
        <h1>404</h1>
        <p>你要找的页面不存在，可能已被删除或移动。</p>
        <a href="/">← 返回首页</a>
      </div>
    </div>
  </main>

  {{ template "footer" . }}
</body>
</html>
{{ end }}
