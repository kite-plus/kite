{{ define "pages/default.html" }}
<!DOCTYPE html>
<html lang="zh-CN">
{{ template "head" . }}
<body>
  {{ template "header" . }}

  <main>
    <div class="container">
      <h1 class="page-title">{{ .Page.Title }}</h1>
      <div class="post-content">
        {{ .Page.ContentHTML | safeHTML }}
      </div>
    </div>
  </main>

  {{ template "footer" . }}
</body>
</html>
{{ end }}
