{{ define "pages/github.html" }}
<!DOCTYPE html>
<html lang="zh-CN">
{{ template "head" . }}
<body>
  {{ template "header" . }}

  <main>
    <div class="container">
      <h1 class="page-title">{{ .Page.Title }}</h1>

      {{ if .Page.ContentHTML }}
      <div class="post-content" style="margin-bottom: 2rem;">
        {{ .Page.ContentHTML | safeHTML }}
      </div>
      {{ end }}

      <div id="github-repos"
           data-username="{{ index .PageConfig "username" }}"
           data-count="{{ index .PageConfig "count" }}"
           data-show-fork="{{ index .PageConfig "show_fork" }}">
        <p style="text-align:center;color:var(--c-text-secondary);padding:2rem 0;">加载中…</p>
      </div>

      <style>
        .repo-grid {
          display: grid;
          grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
          gap: 1rem;
        }
        .repo-card {
          border: 1px solid var(--c-border);
          border-radius: var(--radius);
          padding: 1.25rem;
          transition: border-color .15s;
        }
        .repo-card:hover { border-color: var(--c-accent); }
        .repo-card h3 {
          font-size: 1rem;
          font-weight: 600;
          margin-bottom: 0.375rem;
        }
        .repo-card h3 a { color: var(--c-accent); }
        .repo-card p {
          font-size: 0.875rem;
          color: var(--c-text-secondary);
          line-height: 1.5;
          margin-bottom: 0.5rem;
          display: -webkit-box;
          -webkit-line-clamp: 2;
          -webkit-box-orient: vertical;
          overflow: hidden;
        }
        .repo-meta {
          display: flex;
          gap: 1rem;
          font-size: 0.75rem;
          color: var(--c-text-secondary);
        }
        .repo-meta span { display: flex; align-items: center; gap: 0.25rem; }
        .lang-dot {
          display: inline-block;
          width: 10px;
          height: 10px;
          border-radius: 50%;
          background: var(--c-accent);
        }
      </style>

      <script>
        (function() {
          var el = document.getElementById('github-repos');
          var username = el.dataset.username;
          var count = parseInt(el.dataset.count) || 6;
          var showFork = el.dataset.showFork === 'true';

          if (!username) {
            el.innerHTML = '<p style="text-align:center;color:var(--c-text-secondary);">未配置 GitHub 用户名</p>';
            return;
          }

          fetch('https://api.github.com/users/' + username + '/repos?sort=stars&per_page=100')
            .then(function(res) { return res.json(); })
            .then(function(repos) {
              if (!Array.isArray(repos)) {
                el.innerHTML = '<p style="text-align:center;color:var(--c-text-secondary);">无法加载仓库数据</p>';
                return;
              }
              var filtered = showFork ? repos : repos.filter(function(r) { return !r.fork; });
              filtered = filtered.slice(0, count);

              if (filtered.length === 0) {
                el.innerHTML = '<p style="text-align:center;color:var(--c-text-secondary);">暂无公开仓库</p>';
                return;
              }

              var html = '<div class="repo-grid">';
              filtered.forEach(function(repo) {
                html += '<div class="repo-card">';
                html += '<h3><a href="' + repo.html_url + '" target="_blank" rel="noopener">' + repo.name + '</a></h3>';
                html += '<p>' + (repo.description || '暂无描述') + '</p>';
                html += '<div class="repo-meta">';
                if (repo.language) {
                  html += '<span><span class="lang-dot"></span>' + repo.language + '</span>';
                }
                html += '<span>⭐ ' + repo.stargazers_count + '</span>';
                html += '<span>🍴 ' + repo.forks_count + '</span>';
                html += '</div></div>';
              });
              html += '</div>';
              el.innerHTML = html;
            })
            .catch(function() {
              el.innerHTML = '<p style="text-align:center;color:var(--c-text-secondary);">加载失败，请稍后重试</p>';
            });
        })();
      </script>
    </div>
  </main>

  {{ template "footer" . }}
</body>
</html>
{{ end }}
