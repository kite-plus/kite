name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs for the same ref when a new commit lands so PRs
# don't pile up duplicate work.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend (go vet + test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.7"
          # Actions cache restores module and build caches across runs,
          # which is the biggest CI speed-up for a Go repo of this size.
          cache: true

      - name: Download modules
        run: go mod download

      - name: Vet
        # Scoped to the backend packages so stray Go files shipped inside
        # web/admin/node_modules (e.g. flatted/golang) never enter the build.
        run: go vet ./internal/... ./cmd/...

      - name: Test
        # -race catches data races that the existing quota/reservation
        # goroutine tests rely on; -count=1 disables the caching layer so
        # flakes surface on the PR instead of next week.
        run: go test ./internal/... ./cmd/... -race -count=1

  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/admin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/admin/package-lock.json

      - name: Install dependencies
        # npm ci is strict about lockfile consistency — it catches accidentally
        # committed package.json changes that weren't applied to the lock.
        run: npm ci

      - name: Lint
        # ESLint currently reports pre-existing React 19 rule violations
        # (react-hooks/set-state-in-effect, react-refresh/only-export-
        # components) that need dedicated refactors to resolve. Surface
        # them in the PR summary without gating merges; once the backlog
        # is cleared, flip continue-on-error off.
        continue-on-error: true
        run: npm run lint

      - name: Type-check and build
        # The build script runs `tsc -b && vite build`, so type errors fail
        # the PR without needing a separate step.
        run: npm run build
