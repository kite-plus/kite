name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v0.1.0)'
        required: true
      latest:
        description: 'Also tag as latest'
        required: false
        default: 'true'

permissions:
  contents: read
  packages: write

jobs:
  docker:
    name: Build & push multi-arch image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
            IS_LATEST="${{ !github.event.release.prerelease }}"
          else
            TAG="${{ inputs.tag }}"
            IS_LATEST="${{ inputs.latest }}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "is_latest=$IS_LATEST" >> "$GITHUB_OUTPUT"
          echo "Resolved tag=$TAG version=$VERSION latest=$IS_LATEST"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          IMAGE="ghcr.io/${{ github.repository }}"
          # ghcr requires lowercase image names; the repo slug is already
          # lowercase but normalise just in case a fork uses a mixed-case org.
          IMAGE="$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')"
          TAGS="${IMAGE}:${{ steps.meta.outputs.tag }},${IMAGE}:${{ steps.meta.outputs.version }}"
          if [ "${{ steps.meta.outputs.is_latest }}" = "true" ]; then
            TAGS="${TAGS},${IMAGE}:latest"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          # Pass build identity into the Go binary via ldflags inside the
          # Dockerfile so `/api/v1/health` reports the exact tag/commit/date
          # of the running image.
          build-args: |
            VERSION=${{ steps.meta.outputs.tag }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.release.published_at || github.event.repository.updated_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.licenses=MIT

      - name: Summary
        run: |
          echo "### Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ steps.tags.outputs.image }}:${{ steps.meta.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ steps.tags.outputs.image }}:${{ steps.meta.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.meta.outputs.is_latest }}" = "true" ]; then
            echo "- \`${{ steps.tags.outputs.image }}:latest\`" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Platforms: \`linux/amd64\`, \`linux/arm64\`" >> $GITHUB_STEP_SUMMARY
