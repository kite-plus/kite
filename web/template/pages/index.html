{{define "index.html"}}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    {{template "head_common"}}
    <title>Kite - 自部署媒体托管系统</title>
    <style>
        .hero-glow {
            position: absolute;
            width: 800px; height: 800px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0,0,0,0.03) 0%, transparent 60%);
            top: 0%; left: 50%;
            transform: translate(-50%, -30%);
            pointer-events: none;
        }
        .bg-grid {
            mask-image: radial-gradient(ellipse at center, white, transparent 75%);
            -webkit-mask-image: radial-gradient(ellipse at center, white, transparent 75%);
        }
        .fade-in { animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both; }
        .fade-in-delay-1 { animation-delay: 0.1s; }
        .fade-in-delay-2 { animation-delay: 0.2s; }
        .fade-in-delay-3 { animation-delay: 0.3s; }
        .fade-in-delay-4 { animation-delay: 0.4s; }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body hx-boost="true" class="font-sans antialiased bg-[#fafafa] text-gray-900 min-h-screen flex flex-col selection:bg-gray-200">
    {{template "header"}}

    <main class="flex-1 flex flex-col relative overflow-hidden">
        <!-- Grid Background -->
        <div class="absolute inset-0 z-0 bg-[linear-gradient(to_right,#80808012_1px,transparent_1px),linear-gradient(to_bottom,#80808012_1px,transparent_1px)] bg-[size:24px_24px] bg-grid"></div>
        <div class="hero-glow z-0"></div>
        
        <div class="max-w-4xl mx-auto px-6 py-24 text-center relative z-10 w-full flex-1 flex flex-col justify-center">
            

            <div class="fade-in inline-flex items-center gap-2.5 rounded-full border border-gray-200/80 bg-white/50 backdrop-blur-md px-4 py-1.5 text-xs font-semibold text-gray-900 mb-10 shadow-sm hover:shadow transition-all mx-auto cursor-default">
                <span class="relative flex h-2 w-2">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                </span>
                开源 · 自部署 · 单文件极速启动
            </div>

            <h1 class="fade-in fade-in-delay-1 text-5xl md:text-7xl font-extrabold tracking-tight leading-[1.1] pb-2 text-transparent bg-clip-text bg-gradient-to-br from-gray-900 via-gray-800 to-gray-500">
                极简体验 · 极速分发<br>你的专属云端图床
            </h1>
            
            <p class="fade-in fade-in-delay-2 mt-8 text-lg text-gray-500 max-w-xl mx-auto leading-relaxed">
                为创作者打造的专业级媒体托管平台。<br class="hidden sm:block">拖拽即刻上传，全球节点极速分发，让你的每一次分享都畅快淋漓。
            </p>

            <!-- Stats -->
            <div id="siteStats" class="fade-in fade-in-delay-2 mt-8 inline-flex items-center gap-3 rounded-xl border border-gray-200/50 bg-white/50 backdrop-blur-sm px-6 py-2 text-sm font-medium text-gray-500 shadow-sm mx-auto w-fit"></div>

            <!-- CTA -->
            <div class="fade-in fade-in-delay-3 mt-12 flex items-center justify-center gap-4">
                <a href="/upload" class="group relative inline-flex items-center gap-2 px-8 py-3.5 bg-gray-900 border border-gray-800 text-white rounded-xl font-medium text-sm hover:bg-black transition-all shadow-[0_0_20px_rgba(0,0,0,0.06)] hover:shadow-[0_0_25px_rgba(0,0,0,0.15)] hover:-translate-y-0.5 overflow-hidden">
                    <div class="absolute inset-0 bg-gradient-to-t from-white/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                    <svg class="w-4 h-4 transition-transform group-hover:-translate-y-0.5 relative z-10" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>
                    <span class="relative z-10">立刻上传</span>
                </a>
                <a href="/explore" class="group inline-flex items-center gap-2 px-8 py-3.5 border border-gray-200 bg-white/60 backdrop-blur-md text-gray-700 rounded-xl font-medium text-sm hover:bg-white hover:border-gray-300 transition-all hover:-translate-y-0.5 shadow-sm hover:shadow">
                    探索广场
                    <svg class="w-4 h-4 transition-transform group-hover:translate-x-1 text-gray-400 group-hover:text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                </a>
            </div>


            
        </div>
    </main>

    {{template "footer"}}

<script>
(function() {
    fetch('/api/v1/public/stats')
        .then(function(r) { return r.json(); })
        .then(function(res) {
            if (res.code === 0 && res.data) {
                var d = res.data;
                var size = d.total_size, unit = 'B';
                if (size >= 1073741824) { size = (size / 1073741824).toFixed(2); unit = 'GB'; }
                else if (size >= 1048576) { size = (size / 1048576).toFixed(2); unit = 'MB'; }
                else if (size >= 1024) { size = (size / 1024).toFixed(1); unit = 'KB'; }
                document.getElementById('siteStats').innerHTML =
                    '<span class="flex items-center gap-2"><svg class="w-4 h-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>' + d.total_files + ' 个文件</span>'
                    + '<span class="text-gray-300">|</span>'
                    + '<span class="flex items-center gap-2"><svg class="w-4 h-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4"/></svg>' + size + ' ' + unit + '</span>';
            }
        })
        .catch(function() {});
})();
</script>
</body>
</html>
{{end}}
