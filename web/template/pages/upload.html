{{define "upload.html"}}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    {{template "head_common" .}}
</head>
<body hx-boost="true" class="font-sans antialiased bg-white text-gray-900 min-h-screen flex flex-col">
    {{template "header" .}}

    <main class="flex-1">
        <div class="max-w-3xl mx-auto px-6 py-16 md:py-24">
            <div class="text-center mb-10">
                <h1 class="text-3xl font-bold tracking-tight">上传文件</h1>
                <p class="mt-3 text-gray-500">拖拽或点击选择文件，上传后即刻获取分享链接。</p>
            </div>

            {{if .GuestUploadEnabled}}
            <div id="dropZone"
                 class="relative border-2 border-dashed border-gray-200 rounded-2xl p-12 text-center cursor-pointer transition hover:border-gray-400 hover:bg-gray-50/50"
                 onclick="document.getElementById('fileInput').click()">
                <input type="file" id="fileInput" class="hidden" multiple>
                <div class="mx-auto w-16 h-16 bg-gray-100 rounded-2xl flex items-center justify-center mb-4">
                    <svg class="w-8 h-8 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
                    </svg>
                </div>
                <p class="text-gray-600 font-medium">拖拽文件到此处，或点击选择</p>
                <p class="mt-1 text-sm text-gray-400">支持图片、视频、音频和文档，单文件最大 {{.UploadMaxFileSizeLabel}}</p>
            </div>

            <div id="uploadList" class="mt-6 space-y-3 hidden"></div>
            <div id="resultList" class="mt-6 space-y-4 hidden"></div>

            <!-- Toast container (top-center) -->
            <div id="toastContainer" class="fixed top-4 left-1/2 -translate-x-1/2 z-[60] flex flex-col items-center gap-2 pointer-events-none"></div>

            <script>
            (function() {
                var dropZone = document.getElementById('dropZone');
                var fileInput = document.getElementById('fileInput');
                var uploadList = document.getElementById('uploadList');
                var resultList = document.getElementById('resultList');
                var toastContainer = document.getElementById('toastContainer');
                var uploadMaxFileSize = Number({{.UploadMaxFileSizeBytes}});

                window.showToast = function(type, message) {
                    var el = document.createElement('div');
                    var base = 'pointer-events-auto flex items-center gap-2 rounded-lg border px-4 py-2.5 text-sm font-medium shadow-lg backdrop-blur transition-all duration-300 transform opacity-0 -translate-y-2';
                    var scheme = type === 'success'
                        ? 'bg-green-50/95 border-green-200 text-green-800'
                        : 'bg-red-50/95 border-red-200 text-red-800';
                    var icon = type === 'success'
                        ? '<svg class="w-4 h-4 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg>'
                        : '<svg class="w-4 h-4 text-red-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/></svg>';
                    el.className = base + ' ' + scheme;
                    el.innerHTML = icon + '<span>' + message + '</span>';
                    toastContainer.appendChild(el);
                    requestAnimationFrame(function() {
                        el.classList.remove('opacity-0','-translate-y-2');
                    });
                    setTimeout(function() {
                        el.classList.add('opacity-0','-translate-y-2');
                        setTimeout(function() { el.remove(); }, 300);
                    }, 2500);
                };

                ['dragenter','dragover'].forEach(function(e) {
                    dropZone.addEventListener(e, function(ev) { ev.preventDefault(); dropZone.classList.add('border-gray-900','bg-gray-50'); });
                });
                ['dragleave','drop'].forEach(function(e) {
                    dropZone.addEventListener(e, function(ev) { ev.preventDefault(); dropZone.classList.remove('border-gray-900','bg-gray-50'); });
                });
                dropZone.addEventListener('drop', function(e) { if(e.dataTransfer.files.length>0) handleFiles(e.dataTransfer.files); });
                fileInput.addEventListener('change', function() { if(fileInput.files.length>0) handleFiles(fileInput.files); fileInput.value=''; });

                function fmtSize(b) {
                    if (b < 1024) return b + ' B';
                    if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
                    if (b < 1073741824) return (b / 1048576).toFixed(2) + ' MB';
                    return (b / 1073741824).toFixed(2) + ' GB';
                }
                function escHtml(s) {
                    var d = document.createElement('div');
                    d.textContent = s == null ? '' : String(s);
                    return d.innerHTML;
                }
                function escAttr(s) {
                    return String(s == null ? '' : s)
                        .replace(/&/g, '&amp;')
                        .replace(/"/g, '&quot;')
                        .replace(/'/g, '&#39;')
                        .replace(/</g, '&lt;')
                        .replace(/>/g, '&gt;');
                }
                function escJsString(s) {
                    return String(s == null ? '' : s)
                        .replace(/\\/g, '\\\\')
                        .replace(/'/g, "\\'")
                        .replace(/\r/g, '\\r')
                        .replace(/\n/g, '\\n')
                        .replace(/</g, '\\x3C');
                }

                function handleFiles(files) {
                    var accepted = false;
                    Array.from(files).forEach(function(file) {
                        if (uploadMaxFileSize > 0 && file.size > uploadMaxFileSize) {
                            showToast('error', file.name + ' 超过单文件大小上限（' + fmtSize(uploadMaxFileSize) + '）');
                            return;
                        }
                        accepted = true;
                        uploadFile(file);
                    });
                    if (accepted) uploadList.classList.remove('hidden');
                }

                function xhrMessage(xhr) {
                    try {
                        var payload = JSON.parse(xhr.responseText || '{}');
                        return payload.message || (payload.data && payload.data.message) || '';
                    } catch (_) {
                        return '';
                    }
                }

                function uploadFile(file) {
                    var id = 'f_' + Math.random().toString(36).slice(2,10);
                    var item = document.createElement('div');
                    item.id = id;
                    item.className = 'flex items-center gap-4 bg-white border border-gray-100 rounded-xl p-4 shadow-sm';
                    item.innerHTML = '<div class="w-10 h-10 bg-gray-100 rounded-lg flex items-center justify-center shrink-0"><svg class="w-5 h-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg></div>'
                        + '<div class="flex-1 min-w-0"><p class="text-sm font-medium text-gray-900 truncate">'+file.name+'</p><p class="text-xs text-gray-400">'+fmtSize(file.size)+'</p>'
                        + '<div class="mt-2 h-1.5 bg-gray-100 rounded-full overflow-hidden"><div class="h-full bg-gray-900 rounded-full transition-all duration-300" style="width:0%" id="'+id+'_bar"></div></div></div>'
                        + '<span class="text-xs text-gray-400 shrink-0" id="'+id+'_pct">0%</span>';
                    uploadList.appendChild(item);

                    var fd = new FormData(); fd.append('file', file);
                    var xhr = new XMLHttpRequest();
                    xhr.open('POST', '/api/v1/public/upload');
                    function setUploadState(progress, label, isError) {
                        var bar = document.getElementById(id + '_bar');
                        var pct = document.getElementById(id + '_pct');
                        if (bar) {
                            bar.style.width = progress + '%';
                            if (isError) {
                                bar.classList.remove('bg-gray-900', 'bg-amber-500', 'animate-pulse');
                                bar.classList.add('bg-red-500');
                            } else {
                                bar.classList.remove('bg-red-500');
                            }
                        }
                        if (pct) pct.textContent = label;
                    }
                    xhr.upload.onprogress = function(e) {
                        if (!e.lengthComputable) return;
                        var p = Math.min(90, Math.round(e.loaded / e.total * 90));
                        setUploadState(p, p + '%', false);
                    };
                    xhr.upload.onload = function() {
                        var bar = document.getElementById(id + '_bar');
                        if (bar) {
                            bar.classList.remove('bg-gray-900');
                            bar.classList.add('bg-amber-500', 'animate-pulse');
                        }
                        setUploadState(95, '处理中', false);
                    };
                    xhr.onload = function() {
                        var bar = document.getElementById(id + '_bar');
                        if (bar) bar.classList.remove('animate-pulse');
                        if(xhr.status===200) {
                            var res=JSON.parse(xhr.responseText);
                            if(res.status&&res.data) {
                                setUploadState(100, '完成', false);
                                document.getElementById(id).remove();
                                if(uploadList.children.length===0) uploadList.classList.add('hidden');
                                showResult(file.name, res.data);
                                showToast('success', '上传成功：' + file.name);
                            } else {
                                setUploadState(100, '失败', true);
                                showToast('error', '上传失败：' + (res.message || file.name));
                            }
                        } else {
                            setUploadState(100, '失败', true);
                            showToast('error', xhrMessage(xhr) || ('上传失败：' + file.name));
                        }
                    };
                    xhr.onerror = function() {
                        var bar = document.getElementById(id + '_bar');
                        if (bar) bar.classList.remove('animate-pulse');
                        setUploadState(100, '失败', true);
                        showToast('error', '网络错误：' + file.name);
                    };
                    xhr.send(fd);
                }

                function showResult(filename, data) {
                    resultList.classList.remove('hidden');
                    var links = data.links || {};
                    var card = document.createElement('div');
                    card.className = 'bg-white border border-gray-100 rounded-2xl p-5 shadow-sm';
                    var isImg = (data.mimetype||'').startsWith('image/');
                    var preview = isImg
                        ? '<img src="'+escAttr(links.url)+'" class="w-16 h-16 object-cover rounded-lg border border-gray-100 shrink-0" alt="">'
                        : '<div class="w-16 h-16 bg-gray-100 rounded-lg flex items-center justify-center shrink-0"><svg class="w-7 h-7 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg></div>';
                    card.innerHTML = '<div class="flex items-center gap-4 mb-4">'+preview
                        + '<div class="min-w-0"><p class="font-medium text-gray-900 truncate">'+escHtml(filename)+'</p><p class="text-xs text-gray-400 mt-0.5">'+fmtSize(data.size)+' · '+escHtml(data.mimetype)+'</p></div>'
                        + '<div class="ml-auto"><span class="inline-flex items-center gap-1 text-xs font-medium text-green-700 bg-green-50 border border-green-100 rounded-full px-2.5 py-1"><svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>已上传</span></div></div>'
                        + '<div class="space-y-2">'+lr('短链接',links.url)+lr('源 URL',links.source_url)+lr('Markdown',links.markdown)+lr('HTML',links.html)+lr('BBCode',links.bbcode)+'</div>';
                    resultList.prepend(card);
                }

                function lr(label, val) {
                    if(!val) return '';
                    return '<div class="rounded-lg bg-gray-50 px-3 py-2"><div class="flex items-start gap-2">'
                        + '<span class="w-20 shrink-0 pt-1 text-xs text-gray-400">'+label+'</span>'
                        + '<div data-copy="'+escAttr(val)+'" data-copy-label="'+escAttr(label)+'" onclick="copyValueFromElement(this)" title="点击复制" class="min-w-0 flex-1 overflow-x-auto rounded-md cursor-copy transition hover:bg-gray-100 active:bg-gray-200 [scrollbar-width:none] [-ms-overflow-style:none] [&::-webkit-scrollbar]:hidden">'
                        + '<code class="block w-max min-w-full whitespace-nowrap bg-transparent px-2 py-1 text-sm text-gray-700 pointer-events-none">'+escHtml(val)+'</code>'
                        + '</div>'
                        + '<button type="button" data-copy="'+escAttr(val)+'" data-copy-label="'+escAttr(label)+'" onclick="copyText(this, event)" class="text-xs text-gray-400 hover:text-gray-900 transition shrink-0 px-2 py-1 rounded hover:bg-gray-200">复制</button></div></div>';
                }

                function fallbackCopyText(text) {
                    var textarea = document.createElement('textarea');
                    textarea.value = text;
                    textarea.setAttribute('readonly', 'readonly');
                    textarea.style.position = 'fixed';
                    textarea.style.opacity = '0';
                    textarea.style.pointerEvents = 'none';
                    document.body.appendChild(textarea);
                    textarea.select();
                    textarea.setSelectionRange(0, textarea.value.length);
                    var copied = false;
                    try {
                        copied = document.execCommand('copy');
                    } catch (_) {}
                    document.body.removeChild(textarea);
                    return copied;
                }

                function flashCopyButton(btn) {
                    if (!btn) return;
                    var original = btn.getAttribute('data-original-text') || btn.textContent;
                    btn.setAttribute('data-original-text', original);
                    btn.textContent = '已复制';
                    btn.classList.add('text-green-700', 'bg-green-50');
                    setTimeout(function() {
                        btn.textContent = original;
                        btn.classList.remove('text-green-700', 'bg-green-50');
                    }, 1500);
                }

                function copyValue(text, label, btn) {
                    var content = text || '';
                    var copyLabel = label || '内容';
                    if (!content) {
                        showToast('error', '没有可复制的内容');
                        return;
                    }

                    function onSuccess() {
                        flashCopyButton(btn);
                        showToast('success', copyLabel + '已复制');
                    }

                    if (navigator.clipboard && navigator.clipboard.writeText) {
                        navigator.clipboard.writeText(content).then(onSuccess).catch(function() {
                            if (fallbackCopyText(content)) {
                                onSuccess();
                                return;
                            }
                            showToast('error', '复制失败，请手动复制');
                        });
                        return;
                    }

                    if (fallbackCopyText(content)) {
                        onSuccess();
                        return;
                    }
                    showToast('error', '复制失败，请手动复制');
                }

                window.copyValueFromElement = function(el) {
                    copyValue(el.getAttribute('data-copy') || '', el.getAttribute('data-copy-label') || '内容');
                };

                window.copyText = function(btn, ev) {
                    if (ev) ev.stopPropagation();
                    copyValue(btn.getAttribute('data-copy') || '', btn.getAttribute('data-copy-label') || '内容', btn);
                };
            })();
            </script>

            {{else}}
            <div class="border-2 border-dashed border-gray-200 rounded-2xl p-16 text-center">
                <div class="mx-auto w-16 h-16 bg-gray-100 rounded-2xl flex items-center justify-center mb-4">
                    <svg class="w-8 h-8 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                    </svg>
                </div>
                <p class="text-gray-500 font-medium">游客上传未开启</p>
                <p class="mt-2 text-sm text-gray-400">请<a href="/login" hx-boost="false" class="text-gray-900 underline underline-offset-4 hover:text-gray-700">登录</a>后上传文件，或联系管理员开启游客上传。</p>
            </div>
            {{end}}
        </div>
    </main>

    {{template "footer" .}}
</body>
</html>
{{end}}
