{{define "head_common"}}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Kite 是一个开源的自部署媒体托管系统，支持图片、视频、音频和文件的上传、管理与分享。">
    <meta name="keywords" content="图床,媒体托管,自部署,图片托管,S3,PicGo,开源">
    <meta property="og:title" content="Kite - 自部署媒体托管系统">
    <meta property="og:description" content="开源、高性能的自部署媒体托管系统，支持图片、视频、音频和文件管理。">
    <meta property="og:type" content="website">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <meta name="htmx-config" content='{"globalViewTransitions":true}'>
    <style>
        ::view-transition-old(root), ::view-transition-new(root) { animation-duration: 0.3s; }
    </style>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          }
        }
      }
    </script>
{{end}}

{{define "header"}}
    <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-100">
        <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
            <a href="/" class="flex items-center gap-2.5">
                <div class="flex items-center justify-center w-8 h-8 rounded-lg bg-gray-900 text-white text-sm font-bold">K</div>
                <span class="font-bold text-lg tracking-tight">Kite</span>
            </a>
            <nav class="flex items-center gap-2 text-sm">
                <a href="/explore" class="px-3 py-2 text-gray-500 hover:text-gray-900 transition font-medium">探索</a>
                <a href="/upload" class="px-3 py-2 text-gray-500 hover:text-gray-900 transition font-medium">上传</a>
                <a href="https://github.com/amigoer/kite" target="_blank" class="px-3 py-2 text-gray-500 hover:text-gray-900 transition font-medium">GitHub</a>
                <a href="/login" class="ml-2 px-4 py-2 bg-gray-900 text-white rounded-lg hover:bg-gray-800 transition font-medium text-sm">登录</a>
            </nav>
        </div>
    </header>
{{end}}

                <div class="flex items-center justify-center w-5 h-5 rounded bg-gray-900 text-white text-[10px] font-bold">K</div>
                <span class="font-medium text-gray-500">Kite</span>
                <span class="text-gray-200 mx-1">·</span>
