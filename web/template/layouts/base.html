{{define "head_common"}}
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Kite 是一个开源的自部署媒体托管系统，支持图片、视频、音频和文件的上传、管理与分享。">
<meta name="keywords" content="图床,媒体托管,自部署,图片托管,S3,PicGo,开源">
<meta property="og:title" content="Kite - 自部署媒体托管系统">
<meta property="og:description" content="开源、高性能的自部署媒体托管系统，支持图片、视频、音频和文件管理。">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/htmx.org@1.9.12"></script>
<meta name="htmx-config" content='{"globalViewTransitions":true}'>
<style>
    ::view-transition-old(root),
    ::view-transition-new(root) {
        animation-duration: 0.3s;
    }
</style>
<script>
    tailwind.config = {
        theme: {
            extend: {
                fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
            }
        }
    }
</script>
{{end}}

{{define "header"}}
<header class="absolute w-full top-0 z-50 bg-transparent">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 h-14 sm:h-16 flex items-center justify-between">
        <a href="/" class="flex items-center gap-2">
            <svg class="w-6 h-6 sm:w-7 sm:h-7 text-gray-900" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"
                fill="currentColor" aria-hidden="true">
                <path d="m16.235 13.059l-4.525 8.516L21.575 30l3.249-12.561z" />
                <path d="m12.751 2l-7.81 13.792l5.991 5.113l4.996-8.824l9.158 4.362l1.973-7.629z" />
            </svg>
            <span class="font-bold text-base sm:text-lg tracking-tight">Kite</span>
        </a>
        <nav class="flex items-center gap-1 sm:gap-2 text-sm">
            <a href="/explore" class="px-2 sm:px-3 py-2 text-gray-500 hover:text-gray-900 transition font-medium">探索</a>
            <a href="/upload" class="px-2 sm:px-3 py-2 text-gray-500 hover:text-gray-900 transition font-medium">上传</a>
            <a href="https://github.com/amigoer/kite" target="_blank"
                class="hidden sm:inline-flex px-3 py-2 text-gray-500 hover:text-gray-900 transition font-medium">GitHub</a>
            <a href="/login" hx-boost="false"
                class="ml-1 sm:ml-2 px-3 sm:px-4 py-1.5 sm:py-2 bg-gray-900 text-white rounded-lg hover:bg-gray-800 transition font-medium text-sm">登录</a>
        </nav>
    </div>
</header>
{{end}}

{{define "footer"}}
<footer class="relative z-10 bg-transparent">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 py-8 sm:py-0 sm:h-14 flex flex-col sm:flex-row items-center justify-between gap-4 sm:gap-2 text-xs text-gray-400">
        <!-- 品牌与描述 -->
        <div class="flex items-center gap-1.5">
            <svg class="w-4 h-4 text-gray-900" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"
                fill="currentColor" aria-hidden="true">
                <path d="m16.235 13.059l-4.525 8.516L21.575 30l3.249-12.561z" />
                <path d="m12.751 2l-7.81 13.792l5.991 5.113l4.996-8.824l9.158 4.362l1.973-7.629z" />
            </svg>
            <span class="font-medium text-gray-500">Kite</span>
            <span class="text-gray-200 mx-1">·</span>
            <span>开源自部署媒体托管系统</span>
        </div>
        
        <!-- 桌面端导航 -->
        <div class="hidden md:flex items-center gap-3 text-gray-300">
            <a href="/upload" class="text-gray-400 hover:text-gray-600 transition">上传</a>
            <span>·</span>
            <a href="/explore" class="text-gray-400 hover:text-gray-600 transition">探索</a>
            <span>·</span>
            <a href="/login" hx-boost="false" class="text-gray-400 hover:text-gray-600 transition">登录</a>
        </div>

        <!-- 链接与版权 -->
        <div class="flex items-center gap-4">
            <a href="https://github.com/amigoer/kite" target="_blank"
                class="flex items-center gap-1 hover:text-gray-600 transition">
                <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor">
                    <path
                        d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z" />
                </svg>
                GitHub
            </a>
            <span>&copy; 2026 Kite</span>
        </div>
    </div>
</footer>
{{end}}
