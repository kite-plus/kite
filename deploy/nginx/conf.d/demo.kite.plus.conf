server {
    listen 80;
    listen [::]:80;
    server_name demo.kite.plus;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name demo.kite.plus;

    ssl_certificate     /etc/nginx/ssl/demo.kite.plus/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/demo.kite.plus/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    client_max_body_size 1024m;
    client_body_timeout 300s;

    proxy_connect_timeout 60s;
    proxy_send_timeout    300s;
    proxy_read_timeout    300s;

    resolver 127.0.0.11 valid=30s ipv6=off;

    location / {
        set $kite_upstream kite:8080;
        proxy_pass http://$kite_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    access_log /var/log/nginx/demo.kite.plus.access.log;
    error_log  /var/log/nginx/demo.kite.plus.error.log;
}
